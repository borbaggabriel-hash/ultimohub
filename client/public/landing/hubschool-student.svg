<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#0f172a" />
  <!-- Student Head -->
  <circle cx="400" cy="250" r="100" fill="#fef3c7" fill-opacity="0.8" />
  <!-- Headphones -->
  <path d="M300 250 A100 100 0 0 1 500 250" stroke="#1e293b" stroke-width="40" stroke-linecap="round" fill="none" />
  <rect x="280" y="220" width="40" height="80" fill="#1e293b" rx="20" />
  <rect x="480" y="220" width="40" height="80" fill="#1e293b" rx="20" />
  <!-- Blue Glow -->
  <circle cx="400" cy="300" r="150" fill="#3b82f6" fill-opacity="0.1" blur="30" />
  <!-- Sound Waves -->
  <circle cx="400" cy="300" r="180" stroke="#3b82f6" stroke-width="2" stroke-opacity="0.2" />
  <circle cx="400" cy="300" r="210" stroke="#3b82f6" stroke-width="2" stroke-opacity="0.1" />
  <!-- Academy Label -->
  <text x="400" y="50" text-anchor="middle" fill="#3b82f6" font-family="sans-serif" font-size="24" font-weight="bold" opacity="0.6">HUBSCHOOL ACADEMY</text>
</svg>